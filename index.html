<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css" />
    <title>Login Premium</title>
</head>
<body>

<div class="bg"></div>
<div class="bg"></div>

<div class="login-card">

    <div class="logo">B</div>

    <h1 id="title">Iniciar Sesión</h1>

    <div class="input-group">
        <input
            type="email"
            id="email"
            placeholder="Correo electrónico">
    </div>

    <div class="input-group">
        <input
            type="password"
            id="password"
            placeholder="Contraseña">
    </div>

    <button id="actionBtn">
        Iniciar Sesión
    </button>

    <div class="switch" id="switchMode">
        ¿No tienes cuenta? Regístrate
    </div>

    <p id="message"></p>

</div>

js/app.js

</body>
</html>
